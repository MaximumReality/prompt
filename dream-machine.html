<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neural Prompt Forge • Dream Edition</title>

  <script src="https://js.puter.com/v2/"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-deep:      #0a0e1f;
      --bg-dream:     #0f143a;
      --cyan:         #7df9ff;
      --violet:       #b993ff;
      --magenta:      #ff77c8;
      --pink:         #ff9edb;
      --text:         #e0e7ff;
      --text-muted:   #a5b4fc;
      --border-glow:  rgba(125,249,255,0.20);
      --glow-cyan:    rgba(125,249,255,0.40);
      --glow-violet:  rgba(185,147,255,0.30);
      --glow-magenta: rgba(255,119,200,0.25);
    }

    body {
      background: radial-gradient(circle at 18% 12%, #1a1f4a 0%, #0f143a 35%, #0a0e1f 60%, #02030a 100%);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      margin: 0;
      transition: background 0.8s ease, color 0.8s ease;
    }

    body.mr {
      --bg-deep: #000;
      --bg-dream: #020402;
      --cyan: #39ff14;
      --violet: #ff00ff;
      --magenta: #00ffff;
      --text: #ccffcc;
      --text-muted: #88cc88;
      background: #000204;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      background: linear-gradient(90deg, var(--cyan), var(--violet), var(--magenta));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 24px var(--glow-cyan);
    }

    .glass {
      background: rgba(15,20,58,0.48);
      border: 1px solid var(--border-glow);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px var(--glow-cyan),
                  inset 0 2px 12px var(--glow-violet);
      border-radius: 1.5rem;
    }

    body.mr .glass {
      background: rgba(8,18,8,0.55);
      border-color: rgba(57,255,20,0.35);
      box-shadow: 0 0 28px #39ff1444,
                  inset 0 0 16px #39ff1422;
    }

    textarea, input, select {
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(125,249,255,0.25);
      color: white;
      border-radius: 0.875rem;
      padding: 0.75rem 1rem;
      font-family: inherit;
    }

    body.mr textarea, body.mr input, body.mr select {
      border-color: rgba(57,255,20,0.4);
    }

    textarea:focus, input:focus, select:focus {
      outline: none;
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(125,249,255,0.3);
    }

    body.mr textarea:focus, body.mr input:focus, body.mr select:focus {
      border-color: #39ff14;
      box-shadow: 0 0 0 3px #39ff1440;
    }

    .btn-generate {
      background: linear-gradient(135deg, var(--cyan), var(--violet), var(--magenta));
      color: #000814;
      font-weight: 600;
      box-shadow: 0 0 30px var(--glow-cyan);
      transition: all 0.28s ease;
    }

    .btn-generate:hover:not(:disabled) {
      box-shadow: 0 0 48px var(--glow-magenta);
      transform: translateY(-1px);
    }

    body.mr .btn-generate {
      background: linear-gradient(135deg, #39ff14, #00ffff, #ff00ff);
      color: #000;
      box-shadow: 0 0 30px #39ff1440;
    }

    .tag {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(125,249,255,0.22);
      padding: 0.35rem 0.8rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.18s;
      user-select: none;
    }

    .tag:hover {
      background: rgba(125,249,255,0.12);
    }

    .tag.active {
      background: var(--violet);
      color: black;
      border-color: transparent;
      box-shadow: 0 0 12px var(--glow-violet);
    }

    body.mr .tag.active {
      background: #39ff14;
      color: black;
      box-shadow: 0 0 12px #39ff1440;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 4px solid rgba(125,249,255,0.3);
      border-top-color: var(--cyan);
      border-radius: 50%;
      animation: spin 1.1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .scanlines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(57,255,20,0.04) 2px,
        rgba(57,255,20,0.04) 4px
      );
      animation: scan 8s linear infinite;
      opacity: 0;
      z-index: 9999;
    }

    body.mr .scanlines { opacity: 0.5; }

    @keyframes scan { 0% { background-position: 0 0; } 100% { background-position: 0 100px; } }
  </style>
</head>
<body>

<div class="p-4 md:p-6 max-w-6xl mx-auto space-y-6">

  <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
    <h1 class="text-3xl md:text-4xl font-bold tracking-tight">Neural Prompt Forge</h1>
    <button onclick="toggleMR()"
            class="px-5 py-2.5 rounded-full border border-current font-mono text-sm uppercase tracking-wider transition-colors
                   hover:bg-white/10 active:scale-95">
      MR MODE
    </button>
  </header>

  <div class="grid md:grid-cols-2 gap-6">

    <!-- Left column - Prompt builder -->
    <div class="glass p-5 md:p-7 space-y-6">

      <div class="space-y-1.5">
        <label class="block text-sm font-medium opacity-80">Positive Prompt</label>
        <textarea id="pos" rows="5" class="w-full" placeholder="A floating crystal city at twilight, bioluminescent vines, dreamcore aesthetic..."></textarea>
      </div>

      <div class="space-y-1.5">
        <label class="block text-sm font-medium opacity-80">Negative Prompt</label>
        <textarea id="neg" rows="2" class="w-full" placeholder="blurry, lowres, jpeg artifacts, worst quality, deformed..."></textarea>
      </div>

      <!-- Quick style tags -->
      <div class="flex flex-wrap gap-2.5">
        <span class="tag" data-tag="dreamcore">dreamcore</span>
        <span class="tag" data-tag="cyberdream">cyberdream</span>
        <span class="tag" data-tag="synthwave">synthwave</span>
        <span class="tag" data-tag="vaporwave">vaporwave</span>
        <span class="tag" data-tag="liminal">liminal</span>
        <span class="tag" data-tag="surreal">surreal</span>
        <span class="tag" data-tag="photoreal">photoreal</span>
      </div>

      <!-- Sliders -->
      <div class="space-y-4">
        <div>
          <div class="flex justify-between text-sm mb-1">
            <span>Quality</span>
            <span id="q-val">6</span>
          </div>
          <input type="range" id="quality" min="1" max="10" value="6" class="w-full"/>
        </div>
        <div>
          <div class="flex justify-between text-sm mb-1">
            <span>Detail</span>
            <span id="d-val">5</span>
          </div>
          <input type="range" id="detail" min="1" max="10" value="5" class="w-full"/>
        </div>
        <div>
          <div class="flex justify-between text-sm mb-1">
            <span>Weirdness</span>
            <span id="w-val">3</span>
          </div>
          <input type="range" id="weird" min="0" max="10" value="3" class="w-full"/>
        </div>
      </div>

      <!-- Action buttons -->
      <div class="grid grid-cols-2 gap-4 pt-2">
        <button onclick="polishPrompt()" class="py-3 rounded-xl bg-violet-950/60 hover:bg-violet-900/70 font-medium">
          ✨ AI Polish
        </button>
        <button onclick="mutatePrompt()" class="py-3 rounded-xl bg-cyan-950/60 hover:bg-cyan-900/70 font-medium">
          🌀 Mutate
        </button>
      </div>
<div class="flex items-center gap-3 mt-3">
  <input type="checkbox" id="testMode" class="w-5 h-5 accent-cyan-400">
  <label for="testMode" class="text-sm opacity-80">Test Mode (free preview, lower quality)</label>
</div>
      <button onclick="generateImages()" id="genBtn"
              class="w-full py-5 rounded-2xl text-lg font-semibold btn-generate disabled:opacity-50 disabled:cursor-not-allowed">
        Generate Images
      </button>
    </div>

    <!-- Right column - Results -->
    <div class="glass p-5 md:p-7 flex flex-col">
      <h2 class="text-xl font-semibold mb-4">Results</h2>
      <div id="status" class="text-center text-sm opacity-80 min-h-[1.5rem] mb-4"></div>
      <div id="gallery" class="grid grid-cols-1 sm:grid-cols-2 gap-4 flex-1 min-h-[300px] place-content-start">
        <div class="text-center opacity-60 py-12">Images will appear here</div>
      </div>
    </div>

  </div>
</div>

<div class="scanlines"></div>

<script>
// ──────────────────────────────────────────────
// State
// ──────────────────────────────────────────────

let mr = false;
const pos = document.getElementById('pos');
const neg = document.getElementById('neg');
const genBtn = document.getElementById('genBtn');
const status = document.getElementById('status');
const gallery = document.getElementById('gallery');

// ──────────────────────────────────────────────
// MR toggle
// ──────────────────────────────────────────────

function toggleMR() {
  mr = !mr;
  document.body.classList.toggle('mr', mr);
}

// ──────────────────────────────────────────────
// Tag quick-add
// ──────────────────────────────────────────────

document.querySelectorAll('.tag').forEach(el => {
  el.addEventListener('click', () => {
    el.classList.toggle('active');
    const tag = el.dataset.tag;
    if (el.classList.contains('active')) {
      if (!pos.value.includes(tag)) {
        pos.value = pos.value.trim() ? pos.value.trim() + ", " + tag : tag;
      }
    } else {
      pos.value = pos.value.replace(new RegExp(`,? ?${tag}`, 'gi'), '').trim();
      if (pos.value.endsWith(',')) pos.value = pos.value.slice(0,-1).trim();
    }
  });
});

// ──────────────────────────────────────────────
// Sliders live value
// ──────────────────────────────────────────────

['quality','detail','weird'].forEach(id => {
  const slider = document.getElementById(id);
  const val = document.getElementById(id[0]+'-val');
  slider.oninput = () => val.textContent = slider.value;
});

// ──────────────────────────────────────────────
// AI polish / enhance
// ──────────────────────────────────────────────

async function polishPrompt() {
  const p = pos.value.trim();
  if (!p) return alert("Please write something first");

  status.textContent = "Polishing prompt...";
  genBtn.disabled = true;

  try {
    const res = await puter.ai.chat([
      { role:"system", content:
`You are a dreamy, cinematic prompt engineer.
Enhance the following text into a vivid, detailed, artistic prompt optimized for modern text-to-image models.
Keep core idea, make it longer & richer, add lighting/mood/camera/language that produces beautiful results.
Return **only** the improved prompt – no explanation, no quotes.`
      },
      { role:"user", content: p }
    ]);

    let improved = (res?.text || res?.content || "").trim();
    if (improved) pos.value = improved;
  } catch(e) {
    console.error(e);
    alert("AI polish failed – check internet / Puter login");
  }

  status.textContent = "";
  genBtn.disabled = false;
}

// ──────────────────────────────────────────────
// Mutate (more chaotic remix)
// ──────────────────────────────────────────────

async function mutatePrompt() {
  const p = pos.value.trim();
  if (!p) return alert("Please write something first");

  status.textContent = "Mutating...";
  genBtn.disabled = true;

  try {
    const res = await puter.ai.chat([
      { role:"system", content:
`You are an experimental prompt mutator.
Take the input prompt and create a wilder, stranger, more surreal version while preserving the main subject/concept.
Add unexpected twists, dream-logic elements, unusual descriptors.
Return **only** the mutated prompt – no comments.`
      },
      { role:"user", content: p }
    ]);

    let mutated = (res?.text || res?.content || "").trim();
    if (mutated) pos.value = mutated;
  } catch(e) {
    alert("Mutation failed");
  }

  status.textContent = "";
  genBtn.disabled = false;
}

// ──────────────────────────────────────────────
// Generate images
// ──────────────────────────────────────────────

async function generateImages() {
  const prompt = pos.value.trim();
  if (!prompt) {
    status.textContent = "Please enter a prompt";
    status.className = "text-red-400";
    return;
  }

  const useTestMode = document.getElementById('testMode').checked;

  genBtn.disabled = true;
  status.textContent = useTestMode ? "Generating quick preview..." : "Generating... (10–90 sec)";
  status.className = "text-cyan-300";

  gallery.innerHTML = '';

  const num = 2; // keep small for testing
  const model = "black-forest-labs/FLUX.1-schnell"; // fastest model

  for (let i = 0; i < num; i++) {
    const cell = document.createElement('div');
    cell.className = "relative bg-black/30 rounded-xl overflow-hidden aspect-[4/3] border border-zinc-800/50 flex items-center justify-center";
    cell.innerHTML = `<div class="spinner"></div><p class="absolute text-xs text-zinc-500 bottom-2">Image ${i+1}</p>`;
    gallery.appendChild(cell);

    try {
      const opts = { 
        model,
        test_mode: useTestMode   // ← this is the magic line
      };
      const negText = neg.value.trim();
      if (negText) opts.negative_prompt = negText;

      const blob = await puter.ai.txt2img(prompt, opts);
      const url = URL.createObjectURL(blob);

      const img = document.createElement('img');
      img.src = url;
      img.className = "w-full h-full object-cover";

      cell.innerHTML = '';
      cell.appendChild(img);

      const dl = document.createElement('a');
      dl.href = url;
      dl.download = `dream-${Date.now()}.png`;
      dl.className = "absolute bottom-3 right-3 bg-black/70 text-white px-3 py-1.5 rounded-lg text-sm hover:bg-black/90";
      dl.textContent = "↓ Save";
      cell.appendChild(dl);
    } catch (err) {
      console.error("Generation error:", err);
      cell.innerHTML = `<div class="text-red-400 text-sm p-4 text-center">
        Error<br>${err.message || 'Unknown – try Test Mode or check Puter balance'}
      </div>`;
    }
  }

  genBtn.disabled = false;
  status.textContent = useTestMode ? "Quick previews ready (lower res)" : "Generation finished";
  status.className = "text-emerald-400";
}

// Auto-enable generate button once puter is ready
setTimeout(() => {
  if (window.puter) {
    genBtn.disabled = false;
  }
}, 1200);

</script>
</body>
</html>
