<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEURAL_FORGE_V3 | Maximum Reality</title>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        :root { --blue: #00e5ff; --pink: #ff00ff; --green: #32cd32; }
        * { box-sizing: border-box; background: #000; color: #fff; margin: 0; padding: 0; }
        body { font-family: 'Courier New', monospace; width: 100vw; display: flex; flex-direction: column; align-items: center; padding: 15px; }
        
        .rig { width: 100%; max-width: 430px; border: 2px solid var(--blue); padding: 15px; box-shadow: 0 0 15px var(--blue); }
        .header { font-size: 11px; color: var(--blue); margin-bottom: 10px; text-align: center; font-weight: 900; }

        input, select { width: 100%; padding: 14px; margin-bottom: 10px; background: #111; border: 1px solid var(--pink); color: #fff; font-size: 16px; }

        .btn-group { display: flex; gap: 8px; }
        button { flex: 1; padding: 15px; border: none; font-weight: 900; background: var(--blue); color: #000; cursor: pointer; }
        button.alt { background: var(--pink); }

        #viewfinder { margin-top: 15px; min-height: 300px; border: 1px dashed #333; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        #viewfinder img { width: 100%; height: auto; border: 1px solid #fff; }
        
        .save-btn { display:block; width: 100%; background: var(--green); color: #000; text-align: center; padding: 12px; font-weight: 900; text-decoration: none; margin-top: 5px; font-size: 11px; }
        
        #history { width: 100%; max-width: 430px; display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; }
        .thumb { min-width: 75px; height: 75px; border: 1px solid #222; object-fit: cover; }

        .status { font-size: 10px; color: var(--pink); margin: 10px 0; text-align: center; letter-spacing: 1px; }
        .loading { animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="rig">
    <div class="header">● SECTOR_07 // NEURAL_FORGE_V3</div>
    
    <input type="text" id="promptInput" placeholder="ENTER_COORDINATES...">
    
    <select id="modelSelect">
        <option value="gpt-image-1.5">[ GPT_VISION_DEFAULT ]</option>
        <option value="dall-e-3">[ DALL_E_3_HD ]</option>
    </select>

    <div class="btn-group">
        <button onclick="checkAuthAndForge()">EXECUTE_GEN</button>
        <button class="alt" onclick="resetRig()">RESET</button>
    </div>

    <div id="status" class="status">SYSTEM_IDLE</div>

    <div id="viewfinder">
        <p style="color:#333; font-size:10px;">AWAITING_SIGNAL...</p>
    </div>
</div>

<div id="history"></div>

<script>
    // 1. THE AUTH GATE: Checks if you're signed in before trying to forge
    async function checkAuthAndForge() {
        const status = document.getElementById('status');
        
        if (!puter.auth.isSignedIn()) {
            status.innerText = "AUTHENTICATION_REQUIRED...";
            try {
                // This triggers the standard Puter popup
                await puter.auth.signIn();
                status.innerText = "AUTH_SUCCESS | STARTING_FORGE";
                forge();
            } catch (err) {
                status.innerText = "AUTH_CANCELLED";
            }
        } else {
            forge();
        }
    }

    // 2. THE MAIN ENGINE
    async function forge() {
        const promptText = document.getElementById('promptInput').value;
        const modelName = document.getElementById('modelSelect').value;
        const viewfinder = document.getElementById('viewfinder');
        const status = document.getElementById('status');
        const history = document.getElementById('history');

        if (!promptText) {
            status.innerText = "ERROR: NO_PROMPT";
            return;
        }

        status.innerHTML = "<span class='loading'>UPLINKING_TO_MAINFRAME...</span>";
        viewfinder.innerHTML = "<p class='loading'>[ ... ]</p>";

        try {
            // Updated to the most stable 2026 API call
            const img = await puter.ai.txt2img(promptText, { model: modelName });
            
            status.innerText = "SIGNAL_STABLE";
            viewfinder.innerHTML = "";
            viewfinder.appendChild(img);

            // Create persistent download button
            const saveBtn = document.createElement('a');
            saveBtn.href = img.src;
            saveBtn.download = `MR_FORGE_${Date.now()}.png`;
            saveBtn.className = "save-btn";
            saveBtn.innerText = "[ SAVE_TO_ARCHIVES ]";
            viewfinder.appendChild(saveBtn);

            // Push to History Strip
            const thumb = document.createElement('img');
            thumb.src = img.src;
            thumb.className = "thumb";
            thumb.onclick = () => {
                viewfinder.innerHTML = "";
                viewfinder.appendChild(thumb.cloneNode());
                viewfinder.appendChild(saveBtn.cloneNode(true));
            };
            history.prepend(thumb);

        } catch (error) {
            console.error(error);
            status.innerText = "LINK_SEVERED: " + (error.message || "CHECK_CONSOLE");
        }
    }

    function resetRig() {
        document.getElementById('promptInput').value = "";
        document.getElementById('status').innerText = "SYSTEM_REBOOTED";
        document.getElementById('viewfinder').innerHTML = "<p style='color:#333; font-size:10px;'>AWAITING_SIGNAL...</p>";
    }
</script>

</body>
</html>
