<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Prompt Forge • Dream Edition</title>
    <script src="https://js.puter.com/v2/"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Orbitron:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0e1f; --bg-dream: #0f143a;
            --dream-cyan: #7df9ff; --dream-violet: #b993ff; --dream-magenta: #ff77c8;
            --text-soft: #e0e7ff; --text-muted: #a5b4fc;
            --border-dream: rgba(125,249,255,0.18);
            --glow-cyan: rgba(125,249,255,0.35); --glow-violet: rgba(185,147,255,0.25);
            --mr-green: #39ff14; --mr-pink: #ff00ff; --mr-cyan: #00ffff;
        }
        body {
            background: radial-gradient(circle at 20% 15%, #1a1f4a 0%, #0f143a 30%, #0a0e1f 55%, #02030a 100%);
            color: var(--text-soft);
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            margin: 0;
            transition: background 0.8s, color 0.8s;
        }
        body.mr-active {
            background: #050a02;
            color: #ccffcc;
        }
        h1 {
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(90deg, var(--dream-cyan), var(--dream-violet), var(--dream-magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px var(--glow-cyan);
        }
        body.mr-active h1 {
            background: linear-gradient(90deg, var(--mr-pink), var(--mr-green), var(--mr-cyan));
        }
        .glass {
            background: rgba(15,20,58,0.45);
            border: 1px solid var(--border-dream);
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px var(--glow-cyan), inset 0 0 20px var(--glow-violet);
            border-radius: 1.5rem;
        }
        body.mr-active .glass {
            background: rgba(10,18,10,0.65);
            border-color: rgba(57,255,20,0.35);
            box-shadow: 0 0 25px #39ff14;
        }
        textarea, input, select {
            background: rgba(0,0,0,0.4);
            border: 1px solid #4a5568;
            color: white;
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
        }
        textarea:focus, input:focus, select:focus {
            border-color: var(--dream-cyan);
            box-shadow: 0 0 0 3px rgba(125,249,255,0.3);
            outline: none;
        }
        body.mr-active textarea:focus, body.mr-active input:focus, body.mr-active select:focus {
            border-color: #39ff14;
            box-shadow: 0 0 0 3px rgba(57,255,20,0.4);
        }
        #generateBtn {
            background: linear-gradient(135deg, var(--dream-cyan), var(--dream-violet), var(--dream-magenta));
            color: #000814;
            font-weight: 600;
            box-shadow: 0 0 30px var(--glow-cyan);
            transition: all 0.3s;
        }
        #generateBtn:hover:not(:disabled) {
            box-shadow: 0 0 50px var(--dream-magenta);
            transform: translateY(-2px);
        }
        .tag {
            background: rgba(255,255,255,0.05);
            border: 1px solid #4a5568;
            padding: 0.4rem 0.8rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tag.selected {
            background: var(--dream-violet);
            color: black;
            border-color: transparent;
        }
        body.mr-active .tag.selected {
            background: #39ff14;
            color: black;
        }
        .spinner {
            border: 4px solid rgba(125,249,255,0.3);
            border-top: 4px solid var(--dream-cyan);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="p-4 max-w-5xl mx-auto">
    <h1 class="text-3xl font-bold mb-6 text-center">Neural Prompt Forge</h1>

    <!-- Prompt Builder Section -->
    <div class="glass p-6 mb-6">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-semibold">Prompt Builder</h2>
            <button onclick="toggleMR()" class="px-4 py-2 bg-black/40 border border-green-500/50 rounded-lg text-green-400 text-sm font-mono hover:bg-green-900/30">
                MR MODE
            </button>
        </div>

        <textarea id="prompt" rows="4" class="w-full mb-4" placeholder="Describe your dream image..."></textarea>
        <textarea id="negative" rows="2" class="w-full mb-4" placeholder="Things to avoid (blurry, deformed...)"></textarea>

        <!-- Simple tag examples - you can expand this later -->
        <div class="flex flex-wrap gap-2 mb-4">
            <span class="tag" onclick="this.classList.toggle('selected')">cyberpunk</span>
            <span class="tag" onclick="this.classList.toggle('selected')">ethereal</span>
            <span class="tag" onclick="this.classList.toggle('selected')">neon</span>
            <span class="tag" onclick="this.classList.toggle('selected')">surreal</span>
            <span class="tag" onclick="this.classList.toggle('selected')">vaporwave</span>
        </div>

        <div class="flex flex-wrap gap-3">
            <button onclick="mutatePrompt()" class="flex-1 bg-violet-900/60 hover:bg-violet-800 py-3 rounded-xl">🌀 Mutate Prompt</button>
            <button onclick="addNeuralNoise()" class="flex-1 bg-cyan-900/60 hover:bg-cyan-800 py-3 rounded-xl">⚡ Neural Noise</button>
            <button onclick="generateImages()" id="generateBtn" class="flex-1 py-3 rounded-xl font-bold">Generate Images</button>
        </div>
    </div>

    <!-- Results -->
    <div class="glass p-6">
        <div id="status" class="text-center mb-4 text-sm text-cyan-300"></div>
        <div id="resultsGrid" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
    </div>
</div>

<script>
// State
let mrMode = false;

// Toggle MR aesthetic
function toggleMR() {
    mrMode = !mrMode;
    document.body.classList.toggle('mr-active', mrMode);
}

// Basic prompt enhancement
async function mutatePrompt() {
    const promptEl = document.getElementById('prompt');
    const text = promptEl.value.trim();
    if (!text) return alert("Enter a prompt first");

    try {
        const res = await puter.ai.chat([
            {role:"system", content:"You are a dreamy artistic prompt engineer. Make this more vivid, cinematic, detailed and surreal."},
            {role:"user", content:text}
        ]);
        promptEl.value = (res?.text || res?.content || text + " ... remixed").trim();
    } catch(e) {
        alert("AI failed — check sign-in or connection");
    }
}

// Add random neural/glitch flavor
function addNeuralNoise() {
    const p = document.getElementById('prompt');
    const noises = [
        ", latent space artifacts, neural dream bleed",
        ", quantum fluctuations, holographic distortion",
        ", glitch overlay, VHS tracking lines",
        ", ethereal plasma glow, chromatic aberration"
    ];
    p.value = (p.value.trim() + noises[Math.floor(Math.random()*noises.length)]).trim();
}

// Main generation
async function generateImages() {
    const btn = document.getElementById('generateBtn');
    const status = document.getElementById('status');
    const grid = document.getElementById('resultsGrid');

    const prompt = document.getElementById('prompt').value.trim();
    if (!prompt) return status.textContent = "Please write a prompt";

    const negative = document.getElementById('negative').value.trim();
    const num = 3; // fixed for simplicity - can make selectable later

    btn.disabled = true;
    status.textContent = "Generating... (10–60 sec)";

    grid.innerHTML = '';
    for (let i = 0; i < num; i++) {
        const div = document.createElement('div');
        div.className = "relative bg-black/40 rounded-xl overflow-hidden aspect-square border border-zinc-800 flex items-center justify-center";
        div.innerHTML = '<div class="spinner"></div><p class="absolute text-xs text-zinc-500">Image '+(i+1)+'</p>';
        grid.appendChild(div);

        try {
            const opts = { model: "black-forest-labs/FLUX.1-schnell" };
            if (negative) opts.negative_prompt = negative;

            const blob = await puter.ai.txt2img(prompt, opts);
            const url = URL.createObjectURL(blob);

            const img = document.createElement('img');
            img.src = url;
            img.className = "w-full h-full object-cover";
            div.innerHTML = '';
            div.appendChild(img);

            // mini download button
            const a = document.createElement('a');
            a.href = url;
            a.download = `dream-${Date.now()}.png`;
            a.className = "absolute bottom-2 right-2 bg-white/80 text-black px-3 py-1 rounded text-xs";
            a.textContent = "↓";
            div.appendChild(a);
        } catch (e) {
            div.innerHTML = `<p class="text-red-400 text-xs p-4">Error</p>`;
        }
    }

    btn.disabled = false;
    status.textContent = "Generation complete";
}
</script>
</body>
</html>
