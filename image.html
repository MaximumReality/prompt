<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEURAL_FORGE | Maximum Reality</title>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        :root { --blue: #00e5ff; --pink: #ff00ff; --green: #32cd32; }
        * { box-sizing: border-box; background: #000; color: #fff; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Courier New', monospace; 
            width: 100vw; height: 100vh; 
            overflow-x: hidden;
            display: flex; flex-direction: column; align-items: center;
            padding-top: 20px;
        }

        /* 1. MAIN RIG (iPhone 14 Pro Max Locked) */
        .rig-container {
            width: 92%; max-width: 430px;
            border: 2px solid var(--blue);
            padding: 15px;
            box-shadow: 0 0 15px var(--blue);
            margin-bottom: 20px;
        }

        .header { font-size: 14px; color: var(--blue); margin-bottom: 15px; text-align: center; font-weight: 900; }

        input, select {
            width: 100%; padding: 12px; margin-bottom: 10px;
            background: #111; border: 1px solid var(--pink);
            color: #fff; font-family: inherit; font-size: 16px; /* Prevents iOS zoom */
        }

        .btn-group { display: flex; gap: 10px; }
        button {
            flex: 1; padding: 12px; border: none; font-weight: 900;
            background: var(--blue); color: #000; cursor: pointer;
        }
        button.alt { background: var(--pink); }

        /* 2. THE VIEWFINDER */
        #viewfinder {
            margin-top: 15px; min-height: 200px;
            border: 1px dashed #333; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        #viewfinder img { width: 100%; height: auto; border: 1px solid #fff; }
        .save-btn { 
            width: 100%; background: var(--green); color: #000; 
            text-decoration: none; text-align: center; padding: 10px; 
            font-size: 12px; font-weight: 900; margin-top: 5px;
        }

        /* 3. HISTORY STRIP */
        .history-label { font-size: 10px; color: #444; width: 92%; margin-bottom: 5px; }
        #history-strip {
            width: 92%; display: flex; gap: 10px; overflow-x: auto;
            padding-bottom: 10px; scrollbar-width: none;
        }
        .hist-thumb { 
            min-width: 80px; height: 80px; border: 1px solid #222; 
            object-fit: cover; opacity: 0.6; 
        }

        .loading { color: var(--pink); animation: blink 1s infinite; font-size: 12px; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="rig-container">
    <div class="header">● SECTOR_07 // NEURAL_IMAGE_FORGE</div>
    
    <input type="text" id="promptInput" placeholder="Enter coordinates (prompt)...">
    
    <select id="styleSelect">
        <option value="">[ RAW_SIGNAL ]</option>
        <option value=", cyberpunk neon synthwave style, high contrast, 8k">[ AZUL_VISION ]</option>
        <option value=", chaotic glitch art, messy ink, neon green accents">[ MOCHKIL_CHAOS ]</option>
        <option value=", retro 80s arcade, pixel art, vibrant colors">[ LUNA_VERSE ]</option>
    </select>

    <div class="btn-group">
        <button onclick="generate()">EXECUTE_GEN</button>
        <button class="alt" onclick="reset()">RESET</button>
    </div>

    <div id="viewfinder">
        <p style="color:#444; font-size:10px;">Awaiting Neural Link...</p>
    </div>
</div>

<div class="history-label">RECOVERY_LOG:</div>
<div id="history-strip"></div>

<script>
    async function generate() {
        const input = document.getElementById('promptInput');
        const style = document.getElementById('styleSelect').value;
        const viewfinder = document.getElementById('viewfinder');
        const history = document.getElementById('history-strip');

        if (!input.value) return;

        const fullPrompt = input.value + style;
        viewfinder.innerHTML = "<p class='loading'>[ FORGING_REALITY... ]</p>";

        try {
            // Using Puter.js - Fast Flux model
            const imgElement = await puter.ai.txt2img(fullPrompt, { model: 'flux-1-schnell' });
            
            // Build the Save/Download link
            const saveLink = document.createElement('a');
            saveLink.href = imgElement.src;
            saveLink.download = `MR_FORGE_${Date.now()}.png`;
            saveLink.className = "save-btn";
            saveLink.innerText = "[ SAVE_TO_ARCHIVES ]";

            // Update Viewfinder
            viewfinder.innerHTML = "";
            viewfinder.appendChild(imgElement);
            viewfinder.appendChild(saveLink);

            // Add to History Strip
            const thumb = document.createElement('img');
            thumb.src = imgElement.src;
            thumb.className = "hist-thumb";
            thumb.onclick = () => { // Tap history to bring back to main view
                viewfinder.innerHTML = "";
                viewfinder.appendChild(thumb.cloneNode());
                viewfinder.appendChild(saveLink.cloneNode(true));
            };
            history.prepend(thumb);

        } catch (e) {
            viewfinder.innerHTML = "<p style='color:red'>[ LINK_SEVERED ]</p>";
        }
    }

    function reset() {
        document.getElementById('promptInput').value = "";
        document.getElementById('viewfinder').innerHTML = "<p style='color:#444; font-size:10px;'>Awaiting Neural Link...</p>";
    }
</script>

</body>
</html>
