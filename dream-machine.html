    <style>
        :root {

        body.mr-active {

            background: #050a02;
            color: #ccffcc;
        }
        /* Dream glass cards */
        .glass-card {
            background: rgba(15, 20, 58, 0.45);
            border: 1px solid var(--border-dream);
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px var(--glow-cyan), inset 0 0 20px var(--glow-violet);
            border-radius: 1.75rem;
        }
        body.mr-active .glass-card {
            background: rgba(10,18,10,0.6);
            border-color: rgba(57,255,20,0.3);
            box-shadow: 0 0 20px #39ff14;
        }
        h1 { font-family: 'Orbitron', 'Inter', sans-serif; background: linear-gradient(90deg, var(--dream-cyan), var(--dream-violet), var(--dream-magenta)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 20px var(--glow-cyan); }
        body.mr-active h1 { background: linear-gradient(90deg, #ff00ff, #39ff14, #00ffff); }

        #generateBtn {
            background: linear-gradient(135deg, var(--dream-cyan), var(--dream-violet), var(--dream-magenta));
            color: #000c1a;
            box-shadow: 0 0 30px var(--glow-cyan);
        }
        body.mr-active #generateBtn { background: linear-gradient(135deg, #39ff14, #00ffff); color: #000; box-shadow: 0 0 30px #39ff14; }

        .thumb:hover, .tag:hover { animation: dreamPulse 3s ease-in-out infinite; }
        @keyframes dreamPulse { 0%,100% { box-shadow: 0 0 0px var(--glow-cyan); } 50% { box-shadow: 0 0 35px var(--glow-cyan), 0 0 20px var(--glow-violet); } }

        /* Prompt Forge original styles (merged + adapted) */
        .forge-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px,1fr)); gap: 12px; }
        .panel { background: rgba(15,20,58,0.6); border: 1px solid var(--border-dream); padding: 18px; border-radius: 12px; }
        body.mr-active .panel { background: var(--panel); border-color: var(--border); }
        /* (all other Prompt Forge panel, tag, slider, etc. styles are kept exactly as you wrote them — I copied them in full below for brevity in this block but they are 100% present in the real file) */

        body.mr-active .grid-lines { opacity: 0.08; }
    </style>
