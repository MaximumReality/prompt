<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neural Prompt Forge • Dream + Perchance</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-deep: #0a0e1f; --bg-dream: #0f143a;
      --cyan: #7df9ff; --violet: #b993ff; --magenta: #ff77c8;
      --text: #e0e7ff; --text-muted: #a5b4fc;
    }
    body { background: radial-gradient(circle at 18% 12%, #1a1f4a 0%, #0f143a 35%, #0a0e1f 60%, #02030a 100%);
           color: var(--text); font-family: 'Inter', system-ui, sans-serif; margin:0; min-height:100vh; }
    body.mr { background:#000204; color:#ccffcc; }

    h1 { font-family: 'Orbitron', sans-serif; font-weight:700; 
         background: linear-gradient(90deg, var(--cyan), var(--violet), var(--magenta));
         -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow:0 0 24px var(--cyan); }

    .glass { background: rgba(15,20,58,0.48); border-radius:1.5rem; padding:1.5rem; backdrop-filter:blur(10px); }
    body.mr .glass { background: rgba(8,18,8,0.55); }

    button { font-family: 'Inter', sans-serif; cursor:pointer; }

    iframe { width:100%; height:500px; border:none; border-radius:1rem; }
  </style>
</head>
<body class="p-6">

  <header class="flex justify-between items-center mb-6">
    <h1 class="text-3xl">Neural Prompt Forge</h1>
    <button onclick="document.body.classList.toggle('mr')"
            class="px-4 py-2 rounded-full border border-current font-mono text-sm">MR MODE</button>
  </header>

  <div class="grid md:grid-cols-2 gap-6">
    <!-- Left: Prompt builder -->
    <div class="glass flex flex-col space-y-4">
      <label class="text-sm font-medium opacity-80">Positive Prompt</label>
      <textarea id="pos" rows="5" placeholder="A floating crystal city, dreamcore aesthetic..."></textarea>

      <label class="text-sm font-medium opacity-80">Negative Prompt</label>
      <textarea id="neg" rows="2" placeholder="blurry, lowres, deformed..."></textarea>

      <div class="flex flex-wrap gap-2">
        <span class="tag" data-tag="dreamcore">dreamcore</span>
        <span class="tag" data-tag="cyberdream">cyberdream</span>
        <span class="tag" data-tag="synthwave">synthwave</span>
      </div>

      <button onclick="applyPromptToIframe()" class="py-3 rounded-xl bg-violet-700/50 hover:bg-violet-800 font-medium">Apply Prompt →</button>
    </div>

    <!-- Right: Perchance iframe -->
    <div class="glass flex flex-col space-y-3">
      <h2 class="text-xl font-semibold">Perchance Generator</h2>
      <iframe id="perchanceFrame" src="https://perchance.org/ai-text-to-image-generator"></iframe>
    </div>
  </div>

<script>
  // Tag click
  document.querySelectorAll('.tag').forEach(el=>{
    el.addEventListener('click',()=>{
      el.classList.toggle('active');
      const tag = el.dataset.tag;
      const posTA = document.getElementById('pos');
      if(el.classList.contains('active')) {
        if(!posTA.value.includes(tag)) posTA.value = posTA.value.trim() ? posTA.value.trim() + ", "+tag : tag;
      } else {
        posTA.value = posTA.value.replace(new RegExp(`,? ?${tag}`, 'gi'),'').trim();
      }
    });
  });

  // Send prompt to iframe (if Perchance supports query params)
  function applyPromptToIframe(){
    const prompt = encodeURIComponent(document.getElementById('pos').value);
    const iframe = document.getElementById('perchanceFrame');
    // Example: Perchance may allow ?prompt=TEXT
    iframe.src = `https://perchance.org/ai-text-to-image-generator?prompt=${prompt}`;
  }
</script>

</body>
</html>
